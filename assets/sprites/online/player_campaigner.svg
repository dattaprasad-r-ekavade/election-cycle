<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="16" ry="6" fill="#00000033"/>
  <!-- Legs (top-down, two ovals at bottom) -->
  <ellipse cx="23" cy="50" rx="9" ry="7" fill="#2a4a8a"/>
  <ellipse cx="41" cy="50" rx="9" ry="7" fill="#2a4a8a"/>
  <!-- Body (jacket) -->
  <rect x="17" y="26" width="30" height="24" rx="8" fill="#3a6ac0"/>
  <!-- Arms -->
  <ellipse cx="11" cy="34" rx="7" ry="10" fill="#3a6ac0"/>
  <ellipse cx="53" cy="34" rx="7" ry="10" fill="#3a6ac0"/>
  <!-- Collar / shirt -->
  <rect x="26" y="26" width="12" height="10" fill="#e8e0d0"/>
  <!-- Campaign badge -->
  <circle cx="22" cy="34" r="5" fill="#e8c030"/>
  <text x="22" y="37" text-anchor="middle" font-size="5" fill="#1a1a00" font-family="sans-serif" font-weight="bold">EC</text>
  <!-- Neck -->
  <rect x="27" y="19" width="10" height="9" rx="3" fill="#f0c080"/>
  <!-- Head -->
  <ellipse cx="32" cy="16" rx="16" ry="14" fill="#f0c080"/>
  <!-- Hair -->
  <ellipse cx="32" cy="6" rx="16" ry="8" fill="#6a3a10"/>
  <!-- Eyes -->
  <ellipse cx="26" cy="15" rx="3.5" ry="4" fill="white"/>
  <ellipse cx="38" cy="15" rx="3.5" ry="4" fill="white"/>
  <circle cx="27" cy="16" r="2" fill="#1a1a1a"/>
  <circle cx="39" cy="16" r="2" fill="#1a1a1a"/>
  <!-- Smile -->
  <path d="M27 23 Q32 27 37 23" fill="none" stroke="#8a4a20" stroke-width="1.5"/>
</svg>
