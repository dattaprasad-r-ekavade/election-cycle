<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <!-- Shadow / base -->
  <ellipse cx="60" cy="185" rx="30" ry="10" fill="#0a0a0a" opacity="0.3"/>
  <!-- Body blob -->
  <ellipse cx="60" cy="115" rx="36" ry="50" fill="#7a3ab5"/>
  <!-- Inner body sheen -->
  <ellipse cx="52" cy="105" rx="14" ry="20" fill="#9a5ad5" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="60" cy="58" rx="32" ry="36" fill="#8a4ac5"/>
  <!-- Head sheen -->
  <ellipse cx="50" cy="46" rx="12" ry="10" fill="#aa6ae5" opacity="0.5"/>
  <!-- Eyes (three eyes) -->
  <ellipse cx="46" cy="52" rx="8" ry="9" fill="#ffee00"/>
  <ellipse cx="60" cy="46" rx="8" ry="9" fill="#ffee00"/>
  <ellipse cx="74" cy="52" rx="8" ry="9" fill="#ffee00"/>
  <circle cx="47" cy="53" r="4.5" fill="#1a0a30"/>
  <circle cx="61" cy="47" r="4.5" fill="#1a0a30"/>
  <circle cx="75" cy="53" r="4.5" fill="#1a0a30"/>
  <!-- Grin -->
  <path d="M42 72 Q60 85 78 72" fill="none" stroke="#ffee00" stroke-width="3"/>
  <!-- Teeth -->
  <line x1="50" y1="72" x2="50" y2="80" stroke="white" stroke-width="2.5"/>
  <line x1="60" y1="74" x2="60" y2="82" stroke="white" stroke-width="2.5"/>
  <line x1="70" y1="72" x2="70" y2="80" stroke="white" stroke-width="2.5"/>
  <!-- Tentacle arms -->
  <path d="M24 110 Q10 90 15 70" fill="none" stroke="#6a2a95" stroke-width="10" stroke-linecap="round"/>
  <path d="M96 110 Q110 90 105 70" fill="none" stroke="#6a2a95" stroke-width="10" stroke-linecap="round"/>
  <!-- Claw left -->
  <circle cx="14" cy="68" r="8" fill="#5a1a85"/>
  <!-- Claw right -->
  <circle cx="106" cy="68" r="8" fill="#5a1a85"/>
  <!-- Legs -->
  <ellipse cx="46" cy="165" rx="14" ry="20" fill="#6a2a95"/>
  <ellipse cx="74" cy="165" rx="14" ry="20" fill="#6a2a95"/>
  <ellipse cx="46" cy="183" rx="13" ry="8" fill="#4a1a75"/>
  <ellipse cx="74" cy="183" rx="13" ry="8" fill="#4a1a75"/>
</svg>
